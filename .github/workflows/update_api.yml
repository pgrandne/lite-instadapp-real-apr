name: Update instadapp API Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:      # Permet de le lancer manuellement pour tester

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

  - name: Fetch and Append Data
        run: |
          # 1. On récupère la réponse complète
          FULL_RES=$(curl -s "https://api.instadapp.io/v2/mainnet/lite/users/0x56e001745f105e34afe45398d7bc366db8fc5792/vaults")
          
          # On vérifie si la réponse est bien un JSON valide et contient des données
          if [ -z "$FULL_RES" ] || [ "$FULL_RES" == "null" ]; then
            echo "Erreur: L'API a renvoyé une réponse vide"
            exit 1
          fi

          # Extraction des valeurs avec des variables bien protégées par des guillemets
          NET_APY=$(echo "$FULL_RES" | jq '.[0].apy.apyWithFee // 0 | tonumber')
          GROSS_APY=$(echo "$FULL_RES" | jq '.[0].apy.apyWithoutFee // 0 | tonumber')
          
          # 2. Création de la nouvelle entrée
          # Note l'utilisation de quotes autour des variables shell
          NEW_ENTRY=$(jq -n \
            --arg date "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --argjson net "$NET_APY" \
            --argjson gross "$GROSS_APY" \
            '{date: $date, net_apy: $net, gross_apy: $gross}')

          # 3. Initialisation du fichier si inexistant
          if [ ! -f data.json ] || [ ! -s data.json ]; then echo "[]" > data.json; fi

          # 4. Ajout au tableau historique
          jq ". += [$NEW_ENTRY]" data.json > temp.json && mv temp.json data.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Auto-update data: $(date)" || exit 0
          git push
